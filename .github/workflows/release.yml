name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # - os: ubuntu-latest
          #   platform: linux
          #   args: --linux AppImage
          # - os: windows-latest
          #   platform: win
          #   args: --win nsis
          - os: macos-latest
            platform: mac
            args: --mac dmg
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build app
        run: npm run build

      - name: Build Electron distributables
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Upload artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          shopt -s nullglob
          for file in release/*.AppImage release/*.exe release/*.dmg release/latest-linux.yml release/latest.yml release/latest-mac.yml; do
            gh release upload "$tag" "$file" --clobber
          done

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release edit "$tag" --draft=false
