<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SAI · ghost animations</title>
<style>
  :root {
    --bg-0: #07090d;
    --bg-1: #0d1117;
    --ink: #e8eef7;
    --dim: #7d8794;
    --accent: #7cc4ff;
    --accent-warm: #ffd27c;
    --accent-hot: #ff7a59;
    --grid: rgba(124, 196, 255, 0.06);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background:
      radial-gradient(ellipse at 20% 10%, #14202c 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, #1a1426 0%, transparent 55%),
      var(--bg-0);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Inter, system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 56px 48px 16px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .toggle {
    display: inline-flex;
    border: 1px solid #243044;
    border-radius: 8px;
    overflow: hidden;
    background: #0c121d;
  }
  .toggle button {
    background: transparent;
    color: var(--dim);
    border: 0;
    padding: 8px 14px;
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  .toggle button:hover { color: var(--ink); }
  .toggle button.on {
    background: #182030;
    color: var(--accent);
  }

  h1 {
    margin: 0;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--dim);
    font-weight: 500;
  }
  h1 b { color: var(--ink); font-weight: 600; }

  .legend {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }
  .legend kbd {
    background: #182030;
    border: 1px solid #243044;
    color: var(--ink);
    padding: 2px 7px;
    border-radius: 4px;
    font: inherit;
    font-size: 11px;
  }

  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
    padding: 24px 48px 80px;
  }

  .cell {
    position: relative;
    aspect-ratio: 1 / 1;
    background:
      radial-gradient(circle at 50% 35%, rgba(124,196,255,0.06), transparent 60%),
      linear-gradient(180deg, #0e1320 0%, #080b12 100%);
    border: 1px solid #1c2434;
    border-radius: 14px;
    overflow: hidden;
    display: grid;
    place-items: center;
    transition: border-color .25s, transform .25s;
  }
  .cell:hover {
    border-color: #2c3a55;
    transform: translateY(-2px);
  }
  .cell::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 110%, rgba(124,196,255,0.18), transparent 50%);
    pointer-events: none;
  }

  .label {
    position: absolute;
    left: 12px; top: 12px;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .label b {
    display: block;
    color: var(--ink);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.14em;
    margin-top: 2px;
  }

  .stage {
    width: 60%;
    aspect-ratio: 1 / 1;
    display: grid;
    place-items: center;
    transform-style: preserve-3d;
    perspective: 800px;
  }

  .sai {
    width: 100%;
    height: 100%;
    color: var(--ink);
    filter: drop-shadow(0 0 18px rgba(124,196,255,0.35));
    overflow: visible;
  }
  .sai path { fill: currentColor; }
  .sai .el {
    transform-box: fill-box;
    transform-origin: center;
  }
  .sai .shells-rotate,
  .sai .shells-scale {
    /* fill-box center = rig center, locked by an invisible anchor rect
       so per-chevron scale/translate can't drift the pivot */
    transform-box: fill-box;
    transform-origin: center;
  }
  .sai .bbox-anchor { fill: none; stroke: none; pointer-events: none; }

  /* ---------- helpers ---------- */
  @keyframes spin-y { to { transform: rotateY(360deg); } }
  @keyframes spin-x { to { transform: rotateX(360deg); } }
  @keyframes spin-z { to { transform: rotateZ(360deg); } }
  @keyframes float-y {
    0%, 100% { translate: 0 -4%; }
    50%      { translate: 0  4%; }
  }
  @keyframes breathe {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    50%      { filter: drop-shadow(0 0 28px rgba(124,196,255,0.75)); }
  }

  /* ---------- 1. idle hover ---------- */
  .a-idle .sai {
    animation: float-y 4s ease-in-out infinite, breathe 5s ease-in-out infinite;
  }

  /* ---------- 2. slow Y spin (classic ghost twirl) ---------- */
  .a-twirl .sai {
    animation: spin-y 6s linear infinite, breathe 5s ease-in-out infinite;
    transform-style: preserve-3d;
  }

  /* ---------- 3. tumble (xy spin) ---------- */
  .a-tumble .sai {
    animation: spin-y 7s linear infinite;
    transform-style: preserve-3d;
  }
  .a-tumble .stage {
    animation: spin-x 11s linear infinite;
  }

  /* ---------- 4. shell-shift: outer parts pull apart ---------- */
  .a-shell .sai {
    animation: spin-y 9s linear infinite;
    transform-style: preserve-3d;
  }
  @keyframes shell-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.07); }
  }
  .a-shell .stage { animation: shell-pulse 3.4s ease-in-out infinite; }

  /* ---------- 5. activate (boot up) ---------- */
  @keyframes activate {
    0%   { transform: rotateY(0)     scale(0.85); opacity: 0.4; }
    40%  { transform: rotateY(540deg) scale(1.05); opacity: 1; }
    70%  { transform: rotateY(720deg) scale(0.97); }
    100% { transform: rotateY(720deg) scale(1); opacity: 1; }
  }
  .a-activate .sai {
    animation: activate 2.6s cubic-bezier(.2,.7,.2,1.1) infinite;
    transform-style: preserve-3d;
  }

  /* ---------- 6. scan (thinking) ---------- */
  .a-scan { position: relative; }
  .a-scan .sai { animation: float-y 4s ease-in-out infinite; }
  .a-scan::before {
    content: "";
    position: absolute;
    inset: 20% 20%;
    border-radius: 50%;
    background: conic-gradient(from 0deg,
      transparent 0deg,
      rgba(124,196,255,0.55) 30deg,
      transparent 60deg,
      transparent 360deg);
    mask: radial-gradient(circle, transparent 38%, black 39%, black 50%, transparent 51%);
    -webkit-mask: radial-gradient(circle, transparent 38%, black 39%, black 50%, transparent 51%);
    animation: spin-z 2.8s linear infinite;
    pointer-events: none;
  }

  /* ---------- 7. nervous wobble ---------- */
  @keyframes wobble {
    0%, 100% { transform: rotateZ(-6deg) translateY(0); }
    25%      { transform: rotateZ(6deg)  translateY(-2%); }
    50%      { transform: rotateZ(-4deg) translateY(0); }
    75%      { transform: rotateZ(8deg)  translateY(-1%); }
  }
  .a-wobble .sai { animation: wobble 1.4s ease-in-out infinite; }

  /* ---------- 8. glitch / error ---------- */
  @keyframes glitch {
    0%, 100% { transform: translate(0,0); filter: hue-rotate(0deg); }
    20%      { transform: translate(2%, -1%); filter: hue-rotate(-30deg); }
    40%      { transform: translate(-3%, 1%); }
    60%      { transform: translate(1%, 2%); filter: hue-rotate(40deg); }
    80%      { transform: translate(-1%, -2%); }
  }
  .a-glitch .sai {
    color: #ffb4a3;
    animation: glitch .35s steps(2) infinite, breathe 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(255,122,89,0.6));
  }

  /* ---------- 9. happy (success) ---------- */
  @keyframes hop {
    0%, 100% { transform: translateY(0)   rotateZ(0); }
    30%      { transform: translateY(-12%) rotateZ(-8deg); }
    60%      { transform: translateY(0)   rotateZ(8deg); }
    80%      { transform: translateY(-4%) rotateZ(-3deg); }
  }
  .a-happy .sai {
    color: #b8ffd2;
    animation: hop 1.6s cubic-bezier(.4,1.6,.5,1) infinite;
    filter: drop-shadow(0 0 18px rgba(140,255,200,0.6));
  }

  /* ---------- 10. orbital (spin around vertical axis fast) ---------- */
  .a-orbit .sai {
    animation: spin-y 1.6s linear infinite;
    transform-style: preserve-3d;
  }

  /* ---------- 11. flip & catch ---------- */
  @keyframes flip-catch {
    0%   { transform: rotateX(0)     translateY(0); }
    35%  { transform: rotateX(360deg) translateY(-22%); }
    65%  { transform: rotateX(360deg) translateY(0); }
    75%  { transform: rotateX(360deg) translateY(-4%); }
    100% { transform: rotateX(360deg) translateY(0); }
  }
  .a-flip .sai {
    animation: flip-catch 3.2s cubic-bezier(.3,.7,.2,1) infinite;
    transform-style: preserve-3d;
  }

  /* ---------- 12. dormant (sleep) ---------- */
  @keyframes dormant {
    0%, 100% { transform: rotateZ(-25deg) translateY(0); opacity: .55; }
    50%      { transform: rotateZ(-25deg) translateY(-2%); opacity: .75; }
  }
  .a-dormant .sai {
    color: #7d8794;
    animation: dormant 4s ease-in-out infinite;
    filter: drop-shadow(0 0 6px rgba(125,135,148,0.4));
  }

  /* ============================================================
     Per-element animations (sai-new-2: 5 paths)
       el-0 = bottom chevron
       el-1 = left chevron
       el-2 = right chevron
       el-3 = center square
       el-4 = top chevron

     Outer 4 chevrons live inside .shells-rotate > .shells-scale.
     - .shells-rotate animates rotation around the SVG center
     - .shells-scale  animates scale around the SVG center
     - each .el inside counter-rotates around its own center to
       cancel the group rotation, so chevrons KEEP their orientation
       (they orbit, they don't tumble).
     ============================================================ */

  @keyframes orbit-cw      { to { transform: rotate(360deg); } }
  @keyframes orbit-ccw     { to { transform: rotate(-360deg); } }
  @keyframes group-pulse   { 0%,100% { transform: scale(1); } 50% { transform: scale(1.22); } }
  @keyframes group-pulse-h { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
  @keyframes group-contract{ 0%,100% { transform: scale(1); } 50% { transform: scale(0.78); } }


  @keyframes el-pulse      { 0%,100% { transform: scale(1); } 50% { transform: scale(1.35); } }
  @keyframes el-pulse-soft { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  @keyframes el-grow-in    { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes el-pop        { 0%,70%,100% { transform: scale(1); } 80% { transform: scale(1.4); } }
  @keyframes el-fade       { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

  /* 13. loader — chevron rig rotates as one piece, center pulses */
  .a-loader .shells-rotate { animation: orbit-cw 2s linear infinite; }
  .a-loader .el-3          { animation: el-pulse 1.8s ease-in-out infinite; }

  /* 14. counter-spin — rig spins one way, center spins the other */
  .a-counter .shells-rotate { animation: orbit-cw 2.4s linear infinite; }
  .a-counter .el-3          { animation: orbit-ccw 2.4s linear infinite; }

  /* 15. ripple — pure breathe: shells grow & contract as a unit (no rotation) */
  .a-ripple .shells-scale { animation: group-pulse-h 1.6s ease-in-out infinite; }
  .a-ripple .el-3         { animation: el-pulse 1.6s ease-in-out infinite; }

  /* 16. assemble — pieces grow in from center one by one (boot) */
  .a-assemble .el { animation: el-grow-in 2.4s ease-out infinite; opacity: 0; }
  .a-assemble .el-3 { animation-delay: 0s;    }
  .a-assemble .el-4 { animation-delay: 0.18s; }
  .a-assemble .el-2 { animation-delay: 0.36s; }
  .a-assemble .el-0 { animation-delay: 0.54s; }
  .a-assemble .el-1 { animation-delay: 0.72s; }

  /* 17. ping — each chevron pops in sequence (data signal) */
  .a-ping .el { animation: el-pop 2.4s ease-out infinite; }
  .a-ping .el-3 { animation-delay: 0s;    }
  .a-ping .el-4 { animation-delay: 0.30s; }
  .a-ping .el-2 { animation-delay: 0.60s; }
  .a-ping .el-0 { animation-delay: 0.90s; }
  .a-ping .el-1 { animation-delay: 1.20s; }

  /* 18. orbit shells — rig spins fast as one piece */
  .a-shells .shells-rotate { animation: orbit-cw 1.2s linear infinite; }

  /* 19. scanner — chevrons fade in sequence around the center */
  .a-scanner .el { animation: el-fade 1.6s ease-in-out infinite; }
  .a-scanner .el-4 { animation-delay: 0s;    }
  .a-scanner .el-2 { animation-delay: 0.40s; }
  .a-scanner .el-0 { animation-delay: 0.80s; }
  .a-scanner .el-1 { animation-delay: 1.20s; }
  .a-scanner .el-3 { animation: el-pulse-soft 1.6s ease-in-out infinite; }

  /* 20. error snap — rig spins then jolts as one piece */
  @keyframes group-jolt {
    0%   { transform: rotate(0)       translate(0,0); }
    60%  { transform: rotate(540deg)  translate(0,0); }
    70%  { transform: rotate(540deg)  translate(2%,-1.5%); }
    80%  { transform: rotate(540deg)  translate(-1.5%,1.5%); }
    100% { transform: rotate(720deg)  translate(0,0); }
  }
  .a-snap .shells-rotate { animation: group-jolt 2.4s cubic-bezier(.6,.1,.3,1) infinite; }
  .a-snap .sai           { filter: drop-shadow(0 0 14px rgba(255,122,89,0.55)); }
  .a-snap .el            { color: #ffb4a3; }

  /* 21. breathe — slow pure scale, chevrons hold orientation */
  .a-breathe .shells-scale { animation: group-pulse 3.2s ease-in-out infinite; }
  .a-breathe .el-3         { animation: el-pulse-soft 3.2s ease-in-out infinite; }

  /* 22. inhale — contracts rather than expands */
  .a-inhale .shells-scale { animation: group-contract 2.6s ease-in-out infinite; }
  .a-inhale .el-3         { animation: el-pulse-soft 2.6s ease-in-out infinite; }

  /* ============================================================
     Snap variants — rig spins/jolts as a unit, chevrons bounce
     ============================================================ */

  /* 23. snap-bounce — rig spins, each chevron pulses out-and-in */
  @keyframes el-bounce {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.35); }
  }
  .a-snapb .shells-rotate { animation: orbit-cw 1.8s cubic-bezier(.55,.08,.4,.95) infinite; }
  .a-snapb .el-0,
  .a-snapb .el-1,
  .a-snapb .el-2,
  .a-snapb .el-4 { animation: el-bounce 0.6s ease-in-out infinite; }
  .a-snapb .el-0 { animation-delay: 0s;    }
  .a-snapb .el-2 { animation-delay: 0.15s; }
  .a-snapb .el-4 { animation-delay: 0.30s; }
  .a-snapb .el-1 { animation-delay: 0.45s; }

  /* 24. snap-shake — rig spins steadily, chevrons jitter in place */
  @keyframes el-jitter {
    0%, 100% { transform: translate(0,0)          scale(1);    }
    25%      { transform: translate(2.5%, -1.5%)  scale(1.05); }
    50%      { transform: translate(-1.5%, 2%)    scale(0.97); }
    75%      { transform: translate(1.5%, 1.5%)   scale(1.04); }
  }
  .a-shake .shells-rotate { animation: orbit-cw 2.6s linear infinite; }
  .a-shake .el-0,
  .a-shake .el-1,
  .a-shake .el-2,
  .a-shake .el-4 { animation: el-jitter 0.32s linear infinite; }

  /* 25. snap-step — rig stutters around in 8 steps, chevrons pop on each */
  @keyframes el-pop-step {
    0%, 60%, 100% { transform: scale(1); }
    20%, 40%      { transform: scale(1.25); }
  }
  .a-step .shells-rotate { animation: orbit-cw 2s steps(8, end) infinite; }
  .a-step .el-0,
  .a-step .el-1,
  .a-step .el-2,
  .a-step .el-4 { animation: el-pop-step 0.25s ease-out infinite; }

  /* 26. snap-overshoot — rig swings past then settles, chevrons bounce */
  @keyframes group-overshoot {
    0%   { transform: rotate(0deg);   }
    65%  { transform: rotate(395deg); }
    80%  { transform: rotate(348deg); }
    92%  { transform: rotate(365deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes el-recoil {
    0%, 60%, 100% { transform: scale(1); }
    65%           { transform: scale(0.85); }
    80%           { transform: scale(1.2);  }
    92%           { transform: scale(0.95); }
  }
  .a-over .shells-rotate { animation: group-overshoot 1.8s cubic-bezier(.4,.05,.3,1.2) infinite; }
  .a-over .el-0,
  .a-over .el-1,
  .a-over .el-2,
  .a-over .el-4 { animation: el-recoil 1.8s cubic-bezier(.4,.05,.3,1.2) infinite; }

  /* 27. snap-throw — quick rig spin then chevrons fly out, return */
  @keyframes group-throw {
    0%   { transform: rotate(0deg)    scale(1); }
    55%  { transform: rotate(540deg)  scale(1); }
    70%  { transform: rotate(540deg)  scale(1.08); }
    100% { transform: rotate(720deg)  scale(1); }
  }
  @keyframes el-fly {
    0%, 50%, 100% { transform: scale(1); }
    65%           { transform: scale(1.4); }
    80%           { transform: scale(0.92); }
  }
  .a-throw .shells-rotate { animation: group-throw 2.2s cubic-bezier(.5,.05,.3,1) infinite; }
  .a-throw .el-0,
  .a-throw .el-1,
  .a-throw .el-2,
  .a-throw .el-4 { animation: el-fly 2.2s cubic-bezier(.5,.05,.3,1) infinite; }
  .a-throw .el-3 { animation: el-pulse 2.2s cubic-bezier(.5,.05,.3,1) infinite; }

  /* 28. snap-search — rig hunts left-right, chevrons twitch */
  @keyframes group-hunt {
    0%, 100% { transform: rotate(-22deg); }
    25%      { transform: rotate(0deg);   }
    50%      { transform: rotate(22deg);  }
    75%      { transform: rotate(0deg);   }
  }
  @keyframes el-twitch {
    0%, 100% { transform: scale(1); }
    20%      { transform: scale(1.12); }
    40%      { transform: scale(1); }
  }
  .a-search .shells-rotate { animation: group-hunt 1.6s cubic-bezier(.4,0,.4,1) infinite; }
  .a-search .el-0,
  .a-search .el-1,
  .a-search .el-2,
  .a-search .el-4 { animation: el-twitch 0.6s ease-in-out infinite; }
  .a-search .el-1 { animation-delay: 0.10s; }
  .a-search .el-2 { animation-delay: 0.20s; }
  .a-search .el-4 { animation-delay: 0.30s; }

  /* 29. drift — full sequence with idle gaps between every active phase.
     SVG runs a perpetual subtle bob; idle gaps add larger bobs + glow.

     timeline (% of 28s cycle), idle gaps 3–4%:
       0  – 6    spin 1
       6  – 9    idle 1 (3%)
       9  – 17   grow 1 (left → top → right → bottom)
       17 – 21   idle 2 (4%)
       21 – 27   spin 2 (fast)
       27 – 30   idle 3 (3%)
       30 – 38   grow 2 (bottom → right → left → top)
       38 – 42   idle 4 (4%)
       42 – 48   spin 3 (medium-fast)
       48 – 51   idle 5 (3%)
       51 – 59   grow 3 — SIMULTANEOUS
       59 – 63   idle 6 (4%)
       63 – 69   spin 4 (explosive)
       69 – 72   idle 7 (3%)
       72 – 80   grow 4 (top → left → bottom → right)
       80 – 84   idle 8 (4%)
       84 – 95   shake
       95 – 100  settle */
  @keyframes rig-drift-long {
    /* spin 1 — MEDIUM (0-6%) */
    0%    { transform: rotate(0deg); animation-timing-function: ease-out; }
    3%    { transform: rotate(-40deg);  }
    4%    { transform: rotate(-40deg);  }   /* HOLD */
    4.5%  { transform: rotate(-20deg);  }
    5.2%  { transform: rotate(200deg);  }
    5.6%  { transform: rotate(330deg);  }
    5.8%  { transform: rotate(355deg);  }
    6%    { transform: rotate(360deg);  }
    /* idle 1 + grow 1 + idle 2 — rig holds at 360 */
    21%   { transform: rotate(360deg); animation-timing-function: ease-out; }
    /* spin 2 — FAST (21-27%) */
    24%   { transform: rotate(320deg);  }
    25.5% { transform: rotate(320deg);  }   /* HOLD */
    25.9% { transform: rotate(360deg);  }
    26.4% { transform: rotate(620deg);  }
    26.7% { transform: rotate(700deg);  }
    26.9% { transform: rotate(717deg);  }
    27%   { transform: rotate(720deg);  }
    /* idle 3 + grow 2 + idle 4 hold */
    42%   { transform: rotate(720deg); animation-timing-function: ease-out; }
    /* spin 3 — MEDIUM-FAST (42-48%) */
    45%   { transform: rotate(680deg);  }
    46%   { transform: rotate(680deg);  }   /* HOLD */
    46.4% { transform: rotate(710deg);  }
    47%   { transform: rotate(960deg);  }
    47.5% { transform: rotate(1055deg); }
    47.8% { transform: rotate(1075deg); }
    48%   { transform: rotate(1080deg); }
    /* idle 5 + grow 3 + idle 6 hold */
    63%   { transform: rotate(1080deg); animation-timing-function: ease-out; }
    /* spin 4 — VERY FAST (63-69%) */
    66%   { transform: rotate(1040deg); }
    68%   { transform: rotate(1040deg); }   /* extra-long HOLD */
    68.3% { transform: rotate(1100deg); }
    68.6% { transform: rotate(1380deg); }
    68.8% { transform: rotate(1430deg); }
    68.95%{ transform: rotate(1438deg); }
    69%   { transform: rotate(1440deg); }
    /* idle 7 + grow 4 + idle 8 hold */
    84%   { transform: rotate(1440deg); }
    /* dog-shake (84-95%, ~10 oscillations in 11%) */
    84.8% { transform: rotate(1465deg); }
    85.9% { transform: rotate(1416deg); }
    87%   { transform: rotate(1462deg); }
    88.1% { transform: rotate(1418deg); }
    89.2% { transform: rotate(1458deg); }
    90.3% { transform: rotate(1422deg); }
    91.4% { transform: rotate(1454deg); }
    92.5% { transform: rotate(1424deg); }
    93.6% { transform: rotate(1450deg); }
    94.5% { transform: rotate(1432deg); }
    95%   { transform: rotate(1440deg); }
    /* settle */
    100%  { transform: rotate(1440deg); }
  }

  /* per-chevron drift sequences — four grow phases, distinct orders.
     Grow 1 (8-18%):  left  → top    → right  → bottom   (1, 4, 2, 0)
     Grow 2 (26-36%): bottom → right → left   → top      (0, 2, 1, 4)
     Grow 3 (44-54%): SIMULTANEOUS — all four peak together
     Grow 4 (62-72%): top   → left   → bottom → right    (4, 1, 0, 2) */
  @keyframes el0-drift-long { /* bottom — +y outward */
    0%    { transform: translate(0, 0); }
    /* grow 1 (9-17%) — 4th */
    15%   { transform: translate(0, 0); }
    16%   { transform: translate(0, 55%); }
    17%   { transform: translate(0, 0); }
    /* grow 2 (30-38%) — 1st */
    30%   { transform: translate(0, 0); }
    31%   { transform: translate(0, 38%); }
    32%   { transform: translate(0, 0); }
    /* grow 3 (51-59%) — simultaneous */
    51%   { transform: translate(0, 0); }
    55%   { transform: translate(0, 60%); }
    59%   { transform: translate(0, 0); }
    /* grow 4 (72-80%) — 3rd */
    76%   { transform: translate(0, 0); }
    77%   { transform: translate(0, 42%); }
    78%   { transform: translate(0, 0); }
    100%  { transform: translate(0, 0); }
  }
  @keyframes el1-drift-long { /* left — -x outward */
    0%    { transform: translate(0, 0); }
    /* grow 1 — 1st */
    9%    { transform: translate(0, 0); }
    10%   { transform: translate(-48%, 0); }
    11%   { transform: translate(0, 0); }
    /* grow 2 — 3rd */
    34%   { transform: translate(0, 0); }
    35%   { transform: translate(-30%, 0); }
    36%   { transform: translate(0, 0); }
    /* grow 3 — simultaneous */
    51%   { transform: translate(0, 0); }
    55%   { transform: translate(-55%, 0); }
    59%   { transform: translate(0, 0); }
    /* grow 4 — 2nd */
    74%   { transform: translate(0, 0); }
    75%   { transform: translate(-35%, 0); }
    76%   { transform: translate(0, 0); }
    100%  { transform: translate(0, 0); }
  }
  @keyframes el2-drift-long { /* right — +x outward */
    0%    { transform: translate(0, 0); }
    /* grow 1 — 3rd */
    13%   { transform: translate(0, 0); }
    14%   { transform: translate(40%, 0); }
    15%   { transform: translate(0, 0); }
    /* grow 2 — 2nd */
    32%   { transform: translate(0, 0); }
    33%   { transform: translate(58%, 0); }
    34%   { transform: translate(0, 0); }
    /* grow 3 — simultaneous */
    51%   { transform: translate(0, 0); }
    55%   { transform: translate(50%, 0); }
    59%   { transform: translate(0, 0); }
    /* grow 4 — 4th */
    78%   { transform: translate(0, 0); }
    79%   { transform: translate(45%, 0); }
    80%   { transform: translate(0, 0); }
    100%  { transform: translate(0, 0); }
  }
  @keyframes el4-drift-long { /* top — -y outward */
    0%    { transform: translate(0, 0); }
    /* grow 1 — 2nd */
    11%   { transform: translate(0, 0); }
    12%   { transform: translate(0, -62%); }
    13%   { transform: translate(0, 0); }
    /* grow 2 — 4th */
    36%   { transform: translate(0, 0); }
    37%   { transform: translate(0, -45%); }
    38%   { transform: translate(0, 0); }
    /* grow 3 — simultaneous */
    51%   { transform: translate(0, 0); }
    55%   { transform: translate(0, -55%); }
    59%   { transform: translate(0, 0); }
    /* grow 4 — 1st */
    72%   { transform: translate(0, 0); }
    73%   { transform: translate(0, -38%); }
    74%   { transform: translate(0, 0); }
    100%  { transform: translate(0, 0); }
  }

  /* perpetual subtle bob with idle gaps adding bigger bobs.
     Each idle peak bleeds into the next phase via a residual stop ~2-3%
     after the peak, so transitions blend instead of snapping back to 0. */
  @keyframes drift-idle-bob {
    0%    { translate: 0 0;        filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* spin 1 (0-6%) — subtle */
    3%    { translate: 0 -0.5%; }
    /* idle 1 peak (6-9%) → bleeds into grow 1 */
    7.5%  { translate: 0 -2.8%;    filter: drop-shadow(0 0 22px rgba(124,196,255,0.6)); }
    10.5% { translate: 0 -1.3%;    filter: drop-shadow(0 0 16px rgba(124,196,255,0.45)); }   /* bleed */
    /* grow 1 (9-17%) — settles back to subtle */
    14%   { translate: 0 -0.6%;    filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* idle 2 peak (17-21%) → bleeds into spin 2 */
    19%   { translate: 0 -3.5%;    filter: drop-shadow(0 0 26px rgba(124,196,255,0.7)); }
    22.5% { translate: 0 -1.5%;    filter: drop-shadow(0 0 16px rgba(124,196,255,0.45)); }   /* bleed */
    /* spin 2 settling */
    25%   { translate: 0 -0.4%;    filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* idle 3 peak (27-30%) → bleeds into grow 2 */
    28.5% { translate: 0 -3%;      filter: drop-shadow(0 0 22px rgba(124,196,255,0.6)); }
    31.5% { translate: 0 -1.4%;    filter: drop-shadow(0 0 16px rgba(124,196,255,0.45)); }   /* bleed */
    /* grow 2 settling */
    35%   { translate: 0 -0.7%;    filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* idle 4 peak (38-42%) → bleeds into spin 3 */
    40%   { translate: 0 -3.5%;    filter: drop-shadow(0 0 26px rgba(124,196,255,0.7)); }
    43.5% { translate: 0 -1.5%;    filter: drop-shadow(0 0 16px rgba(124,196,255,0.45)); }   /* bleed */
    /* spin 3 settling */
    46%   { translate: 0 -0.5%;    filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* idle 5 peak (48-51%) → bleeds into grow 3 */
    49.5% { translate: 0 -3%;      filter: drop-shadow(0 0 22px rgba(124,196,255,0.6)); }
    52.5% { translate: 0 -1.5%;    filter: drop-shadow(0 0 16px rgba(124,196,255,0.45)); }   /* bleed */
    /* grow 3 simultaneous (slightly bigger ambient) */
    55.5% { translate: 0 -1.2%;    filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* idle 6 peak (59-63%) → bleeds into spin 4 */
    61%   { translate: 0 -3.5%;    filter: drop-shadow(0 0 26px rgba(124,196,255,0.7)); }
    64.5% { translate: 0 -1.5%;    filter: drop-shadow(0 0 16px rgba(124,196,255,0.45)); }   /* bleed */
    /* spin 4 settling */
    67%   { translate: 0 -0.5%;    filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* idle 7 peak (69-72%) → bleeds into grow 4 */
    70.5% { translate: 0 -3%;      filter: drop-shadow(0 0 22px rgba(124,196,255,0.6)); }
    73.5% { translate: 0 -1.4%;    filter: drop-shadow(0 0 16px rgba(124,196,255,0.45)); }   /* bleed */
    /* grow 4 settling */
    77%   { translate: 0 -0.7%;    filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* idle 8 peak (80-84%) → bleeds into shake */
    82%   { translate: 0 -3.8%;    filter: drop-shadow(0 0 28px rgba(124,196,255,0.75)); }
    85.5% { translate: 0 -1.5%;    filter: drop-shadow(0 0 16px rgba(124,196,255,0.45)); }   /* bleed */
    /* shake — subtle through */
    90%   { translate: 0 -0.5%;    filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
    /* settle / final idle */
    97.5% { translate: 0 -3%;      filter: drop-shadow(0 0 22px rgba(124,196,255,0.6)); }
    100%  { translate: 0 0;        filter: drop-shadow(0 0 12px rgba(124,196,255,0.35)); }
  }
  .a-drift .sai           { animation: drift-idle-bob 28s ease-in-out infinite; }
  .a-drift .shells-rotate { animation: rig-drift-long 28s cubic-bezier(.55,.05,.4,.95) infinite; }
  .a-drift .el-0 { animation: el0-drift-long 28s cubic-bezier(.4,.7,.3,1) infinite; }
  .a-drift .el-1 { animation: el1-drift-long 28s cubic-bezier(.4,.7,.3,1) infinite; }
  .a-drift .el-2 { animation: el2-drift-long 28s cubic-bezier(.4,.7,.3,1) infinite; }
  .a-drift .el-4 { animation: el4-drift-long 28s cubic-bezier(.4,.7,.3,1) infinite; }

  /* 30. drift no-idle — same rig + chevron animations, no svg bob/glow */
  .a-drift-bare .shells-rotate { animation: rig-drift-long 28s cubic-bezier(.55,.05,.4,.95) infinite; }
  .a-drift-bare .el-0 { animation: el0-drift-long 28s cubic-bezier(.4,.7,.3,1) infinite; }
  .a-drift-bare .el-1 { animation: el1-drift-long 28s cubic-bezier(.4,.7,.3,1) infinite; }
  .a-drift-bare .el-2 { animation: el2-drift-long 28s cubic-bezier(.4,.7,.3,1) infinite; }
  .a-drift-bare .el-4 { animation: el4-drift-long 28s cubic-bezier(.4,.7,.3,1) infinite; }

      cfg.shellsIdx.forEach(idx => scl.appendChild(makePath(subpaths[idx], idx)));
      rot.appendChild(scl);
      g.appendChild(rot);

      const center = document.createElementNS(SVG_NS, "g");
      center.setAttribute("class", "center");
      cfg.centerIdx.forEach(idx => center.appendChild(makePath(subpaths[idx], idx)));
      g.appendChild(center);
    } else {
      subpaths.forEach((sd, idx) => g.appendChild(makePath(sd, idx)));
    }

    svg.appendChild(g);
    return svg;
  }

  const tiles = [
    { cls: "a-idle",     tag: "01", name: "idle hover"   },
    { cls: "a-twirl",    tag: "02", name: "ghost twirl"  },
    { cls: "a-tumble",   tag: "03", name: "tumble"       },
    { cls: "a-shell",    tag: "04", name: "shell pulse"  },
    { cls: "a-activate", tag: "05", name: "activate"     },
    { cls: "a-scan",     tag: "06", name: "scan"         },
    { cls: "a-wobble",   tag: "07", name: "wobble"       },
    { cls: "a-glitch",   tag: "08", name: "glitch / err" },
    { cls: "a-happy",    tag: "09", name: "success"      },
    { cls: "a-orbit",    tag: "10", name: "fast orbit"   },
    { cls: "a-flip",     tag: "11", name: "flip & catch" },
    { cls: "a-dormant",  tag: "12", name: "dormant"      },
    { cls: "a-loader",   tag: "13", name: "loader"       },
    { cls: "a-counter",  tag: "14", name: "counter-spin" },
    { cls: "a-ripple",   tag: "15", name: "ripple"       },
    { cls: "a-assemble", tag: "16", name: "assemble"     },
    { cls: "a-ping",     tag: "17", name: "ping"         },
    { cls: "a-shells",   tag: "18", name: "orbit shells" },
    { cls: "a-scanner",  tag: "19", name: "scanner"      },
    { cls: "a-snap",     tag: "20", name: "error snap"   },
    { cls: "a-breathe",  tag: "21", name: "breathe"      },
    { cls: "a-inhale",   tag: "22", name: "inhale"       },
    { cls: "a-snapb",    tag: "23", name: "snap bounce"  },
    { cls: "a-shake",    tag: "24", name: "snap shake"   },
    { cls: "a-step",     tag: "25", name: "snap step"    },
    { cls: "a-over",     tag: "26", name: "overshoot"    },
    { cls: "a-throw",    tag: "27", name: "snap throw"   },
    { cls: "a-search",   tag: "28", name: "search"       },
    { cls: "a-drift",    tag: "29", name: "drift"        },
    { cls: "a-drift-bare", tag: "30", name: "drift bare" },
  ];

  const grid = document.getElementById("grid");
  const tpl  = document.getElementById("t-cell");

  function render(key) {
    grid.innerHTML = "";
    for (const t of tiles) {
      const node = tpl.content.firstElementChild.cloneNode(true);
      node.classList.add(t.cls);
      node.querySelector(".label").innerHTML = `${t.tag}<b>${t.name}</b>`;
      node.querySelector(".stage").appendChild(buildSvg(key));
      grid.appendChild(node);
    }
  }

  const toggle = document.getElementById("toggle");
  toggle.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-svg]");
    if (!btn) return;
    for (const b of toggle.querySelectorAll("button")) b.classList.toggle("on", b === btn);
    render(btn.dataset.svg);
  });

  render("v2");
</script>

</body>
